<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180.png" />
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="./apple-touch-icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="3D Pac-Cube" />
  <meta name="theme-color" content="#05060c" />
  <title>3D Pac-Man · Cube & Pyramid</title>
  <style>
    :root { --accent: #ffd21a; --ghost: #ff3b6b; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #05060c; }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      color: #eef1ff;
      user-select: none;
      -webkit-user-select: none;
    }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    /* HUD */
    #hud {
      position: fixed; inset: 0; pointer-events: none;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 22px 26px;
    }
    #hud .row { display: flex; justify-content: space-between; align-items: flex-start; }
    .panel {
      background: rgba(10, 14, 30, 0.42);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 10px 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }
    #score-label { font-size: 12px; letter-spacing: 3px; opacity: 0.6; text-transform: uppercase; }
    #score { font-size: 30px; font-weight: 700; color: var(--accent); text-shadow: 0 0 18px rgba(255,210,26,0.55); }
    #pellet-info { font-size: 12px; opacity: 0.7; margin-top: 2px; }
    #lives { display: flex; gap: 8px; align-items: center; }
    .life-dot {
      width: 18px; height: 18px; border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff2a8, var(--accent) 70%);
      box-shadow: 0 0 12px rgba(255,210,26,0.7);
      clip-path: polygon(100% 25%, 45% 50%, 100% 75%, 50% 100%, 0 50%, 50% 0);
    }
    #level { font-size: 12px; letter-spacing: 2px; opacity: 0.7; text-transform: uppercase; }

    /* Center messages */
    #center {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    #message {
      font-size: 46px; font-weight: 800; letter-spacing: 4px;
      text-align: center; opacity: 0; transition: opacity 0.35s ease;
      text-shadow: 0 0 30px rgba(0,0,0,0.6);
    }
    #message.show { opacity: 1; }

    /* Start / overlay screen */
    #overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 26px;
      background: radial-gradient(1200px 800px at 50% 35%, rgba(30,40,90,0.55), rgba(4,6,14,0.92));
      pointer-events: auto; z-index: 10; text-align: center;
    }
    #overlay.hidden { display: none; }
    #title { font-size: 58px; font-weight: 900; letter-spacing: 6px;
      background: linear-gradient(90deg, #ffd21a, #ff8a3b, #ff3b6b);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      filter: drop-shadow(0 6px 30px rgba(255,140,40,0.35)); }
    #subtitle { font-size: 15px; opacity: 0.72; max-width: 560px; line-height: 1.7; }
    .keys { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 620px; }
    .key { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: 8px 14px; font-size: 13px; opacity: 0.85; }
    #start-btn {
      pointer-events: auto; cursor: pointer;
      font-size: 18px; font-weight: 700; letter-spacing: 2px;
      color: #10131f; background: linear-gradient(90deg, #ffd21a, #ffb020);
      border: none; border-radius: 999px; padding: 16px 44px;
      box-shadow: 0 10px 30px rgba(255,180,30,0.4);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    #start-btn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 16px 40px rgba(255,180,30,0.55); }
    .secondary-btn {
      pointer-events: auto; cursor: pointer;
      font-size: 14px; font-weight: 700; letter-spacing: 1px;
      color: #dff5ff; background: rgba(70,130,255,0.18);
      border: 1px solid rgba(135,205,255,0.35); border-radius: 999px; padding: 10px 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.22);
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .secondary-btn:hover { transform: translateY(-1px); background: rgba(90,150,255,0.24); box-shadow: 0 12px 28px rgba(0,0,0,0.28); }
    .button-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
    .hud-actions { margin-top: 10px; display: flex; justify-content: flex-end; gap: 10px; }
    .local-test { display: none; }
    .local-test.show { display: inline-flex; }
    #loading { font-size: 14px; opacity: 0.6; }
    .pause-btn {
      pointer-events: auto; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      min-width: 48px; height: 40px; padding: 0 14px;
      border-radius: 999px; border: 1px solid rgba(255,255,255,0.12);
      background: rgba(16,22,42,0.6); color: #eef4ff; font-size: 18px; font-weight: 700;
      backdrop-filter: blur(6px);
    }
    .pause-btn.show { display: inline-flex; }
    #pause-overlay {
      position: fixed; inset: 0; display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: rgba(6,9,18,0.72); backdrop-filter: blur(10px); z-index: 12;
      pointer-events: auto; text-align: center;
    }
    #pause-overlay.show { display: flex; }
    #pause-title { font-size: 34px; font-weight: 800; letter-spacing: 4px; }
    #pause-actions { display: flex; flex-direction: column; gap: 12px; min-width: 220px; }
    #pause-actions button { width: 100%; }
    @media (pointer: coarse) {
      .keys { display: none; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div class="row">
      <div class="panel">
        <div id="score-label">Score</div>
        <div id="score">0</div>
        <div id="pellet-info">Dots 0 / 0</div>
      </div>
      <div class="panel" style="text-align:right;">
        <div id="level">Level 1</div>
        <div id="lives" style="margin-top:8px;justify-content:flex-end;"></div>
        <div id="reward-info" style="margin-top:6px;font-size:16px;letter-spacing:2px;min-height:18px;"></div>
        <div class="hud-actions">
          <button id="pause-btn" class="pause-btn" aria-label="暂停">II</button>
          <button id="jump-lv2-btn-hud" class="secondary-btn local-test">测试 Lv2</button>
        </div>
      </div>
    </div>
    <div></div>
  </div>

  <div id="center"><div id="message"></div></div>

  <div id="overlay">
    <div id="title">3D&nbsp;PAC·CUBE</div>
    <div id="subtitle">
      在立方体世界里吃光所有豆子,躲开六面穿梭的幽灵。<br/>
      第二关移除幽灵,变成纯躲避关:小心钟摆、滚动铁球与重锤,并去危险处搜集战利品。
    </div>
    <div class="keys">
      <div class="key">WASD 移动</div>
      <div class="key">鼠标 转视角</div>
      <div class="key">跨过每条边中间的入口 → 世界翻转到相邻面</div>
      <div class="key">Esc / P 暂停</div>
    </div>
    <div class="button-row">
      <button id="start-btn">开始游戏</button>
      <button id="jump-lv2-btn-overlay" class="secondary-btn local-test">本地测试：Lv2</button>
    </div>
    <div id="loading"></div>
  </div>

  <div id="pause-overlay">
    <div id="pause-title">暂停</div>
    <div id="pause-actions">
      <button id="pause-resume-btn" class="secondary-btn">继续</button>
      <button id="pause-restart-btn" class="secondary-btn">重新开始</button>
      <button id="pause-menu-btn" class="secondary-btn">返回主界面</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
